name: Automated Cloud Deployment

on:
  push:
    branches: [ main ]  # Triggers every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}' # You'll add this to GitHub Secrets

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install python-dotenv

      - name: Execute Deployment Script
        env:
          GOOGLE_PROJECT_ID: ${{ secrets.PROJECT_ID }}
          GOOGLE_AISTUDIO_KEY: ${{ secrets.API_KEY }}
          GOOGLE_FIRESTORE_DB: ${{ secrets.FIRESTORE_DB }}
        run: python deploy.py